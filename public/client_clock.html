<style>
    #clock-module-root {
        font-family: 'Arial Black', sans-serif;
        background-color: #030303;
        color: #FFDB89;
        width: 100%;
        height: 100%;
        min-height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        border-radius: 1rem;
        position: relative;
    }

    .clock-inner-container {
        position: relative;
        width: 800px;
        height: 800px;
        display: flex;
        justify-content: center;
        align-items: center;
        transform: scale(0.75);
    }

    .gear-container {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .display-box {
        position: relative;
        z-index: 10;
        text-align: center;
        width: 500px;
    }

    .time-readout {
        font-size: 100px;
        background: #0D0D0D;
        padding: 20px;
        border-top: 5px solid #FFDB89;
        border-bottom: 5px solid #FFDB89;
        letter-spacing: 5px;
        margin-bottom: 20px;
        min-width: 400px;
        display: inline-block;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        color: #FFDB89;
    }

    .clock-controls {
        margin-top: 20px;
    }

    .clock-btn {
        background: #FFDB89;
        color: #030303;
        border: none;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        margin: 5px;
        border-radius: 8px;
        text-transform: uppercase;
        font-family: 'Arial', sans-serif;
        transition: transform 0.1s, background-color 0.2s;
    }

    .clock-btn:hover {
        background: #ffe9a8;
        transform: scale(1.05);
    }

    .clock-btn:active {
        transform: scale(0.95);
    }

    .clock-btn.mode-active {
        background: #030303;
        color: #FFDB89;
        border: 2px solid #FFDB89;
    }

    .mode-indicator {
        font-size: 24px;
        color: #FFDB89;
        margin-bottom: 10px;
        text-transform: uppercase;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        letter-spacing: 3px;
    }

    #timerInput {
        background: #0D0D0D;
        color: #FFDB89;
        border: 2px solid #FFDB89;
        padding: 10px;
        font-size: 20px;
        width: 150px;
        text-align: center;
        margin-bottom: 10px;
        border-radius: 8px;
    }

    #timerInput::placeholder {
        color: rgba(255,219,137,0.3);
    }
</style>

<div id="clock-module-root">
    <div class="clock-inner-container">
        <canvas id="clockCanvas" width="800" height="800" class="gear-container"></canvas>

        <div class="display-box">
            <div id="modeLabel" class="mode-indicator">Reloj</div>
            <div id="timeDisplay" class="time-readout">00:00</div>

            <div class="clock-controls">
                <div id="timerInputArea" style="display:none;">
                    <input type="number" id="timerInput" placeholder="Segundos">
                </div>

                <button class="clock-btn" onclick="window.clockSetMode('CLOCK')">Reloj</button>
                <button class="clock-btn" onclick="window.clockSetMode('STOPWATCH')">Cronómetro</button>
                <button class="clock-btn" onclick="window.clockSetMode('TIMER')">Cuenta Regresiva</button>
                <br>
                <button class="clock-btn" id="actionBtn" onclick="window.clockHandleAction()">Iniciar</button>
                <button class="clock-btn" onclick="window.clockResetLogic()">Reiniciar</button>
            </div>
        </div>
    </div>
</div>

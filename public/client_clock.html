<style>
    #clock-module-root {
        font-family: 'Arial Black', sans-serif;
        background-color: #030303;
        color: #FFDB89;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 1rem;
        position: relative;
        overflow: hidden;
    }

    /* Clock face — gets scaled via JS to fit any screen */
    .clock-inner-container {
        position: relative;
        width: 800px;
        height: 800px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        /* default scale + margin compensation set by initClockModule */
        transform: scale(0.75);
        margin-top: -100px;
        margin-bottom: -100px;
    }

    .gear-container {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .display-box {
        position: relative;
        z-index: 10;
        text-align: center;
        width: 500px;
    }

    .time-readout {
        font-size: 100px;
        background: #0D0D0D;
        padding: 20px;
        border-top: 5px solid #FFDB89;
        border-bottom: 5px solid #FFDB89;
        letter-spacing: 5px;
        display: inline-block;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        color: #FFDB89;
        min-width: 400px;
    }

    .mode-indicator {
        font-size: 24px;
        color: #FFDB89;
        margin-bottom: 10px;
        text-transform: uppercase;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        letter-spacing: 3px;
    }

    /* Controls — outside the scaled container, always full-size and readable */
    .clock-controls {
        position: relative;
        z-index: 20;
        text-align: center;
        flex-shrink: 0;
        width: 100%;
        padding: 12px 16px;
        box-sizing: border-box;
    }

    .clock-controls-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin-bottom: 6px;
    }

    .clock-btn {
        background: #FFDB89;
        color: #030303;
        border: none;
        padding: 10px 18px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        text-transform: uppercase;
        font-family: 'Arial', sans-serif;
        font-size: 13px;
        transition: transform 0.1s, background-color 0.2s;
        white-space: nowrap;
    }

    .clock-btn:hover  { background: #ffe9a8; transform: scale(1.05); }
    .clock-btn:active { transform: scale(0.95); }
    .clock-btn.mode-active {
        background: #030303;
        color: #FFDB89;
        border: 2px solid #FFDB89;
    }

    #timerInput {
        background: #0D0D0D;
        color: #FFDB89;
        border: 2px solid #FFDB89;
        padding: 10px;
        font-size: 18px;
        width: 140px;
        text-align: center;
        border-radius: 8px;
    }

    #timerInput::placeholder { color: rgba(255,219,137,0.3); }
</style>

<div id="clock-module-root">

    <!-- ── Clock face (auto-scaled by JS) ──────────────────────────────── -->
    <div class="clock-inner-container">
        <canvas id="clockCanvas" width="800" height="800" class="gear-container"></canvas>
        <div class="display-box">
            <div id="modeLabel" class="mode-indicator">Reloj</div>
            <div id="timeDisplay" class="time-readout">00:00</div>
        </div>
    </div>

    <!-- ── Controls (outside scaled container — always readable) ────────── -->
    <div class="clock-controls">
        <div id="timerInputArea" style="display:none; margin-bottom:8px;">
            <input type="number" id="timerInput" placeholder="Segundos">
        </div>
        <div class="clock-controls-row">
            <button class="clock-btn" onclick="window.clockSetMode('CLOCK')">Reloj</button>
            <button class="clock-btn" onclick="window.clockSetMode('STOPWATCH')">Cronómetro</button>
            <button class="clock-btn" onclick="window.clockSetMode('TIMER')">Cuenta Regresiva</button>
        </div>
        <div class="clock-controls-row">
            <button class="clock-btn" id="actionBtn" onclick="window.clockHandleAction()">Iniciar</button>
            <button class="clock-btn" onclick="window.clockResetLogic()">Reiniciar</button>
        </div>
    </div>

</div>

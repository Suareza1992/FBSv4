<div class="h-full flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 border-b border-[#FFDB89]/15 pb-4 px-1 mb-4 shrink-0">
        <div>
            <h1 class="text-xl md:text-3xl font-bold text-[#FFDB89]">Mi Entrenamiento</h1>
            <p class="text-[#FFDB89]/40 mt-1" id="client-program-name">Cargando...</p>
        </div>
        <div class="flex items-center gap-2">
            <span id="current-date-display" class="text-sm font-bold bg-[#FFDB89]/15 text-[#FFDB89] px-3 py-1 rounded-full border border-[#FFDB89]/30">Hoy</span>
            <button id="scroll-to-today-btn" class="text-xs font-bold px-3 py-1.5 rounded-full bg-[#FFDB89]/10 text-[#FFDB89] border border-[#FFDB89]/25 hover:bg-[#FFDB89]/20 transition">
                <i class="fas fa-crosshairs mr-1"></i>Ir a Hoy
            </button>
        </div>
    </div>

    <!-- Mood Bar -->
    <div class="flex flex-wrap items-center gap-4 bg-[#FFDB89]/5 border border-[#FFDB89]/15 px-5 py-3 rounded-xl mb-4 shrink-0">
        <span class="text-xs font-bold text-[#FFDB89]/50 uppercase tracking-wider whitespace-nowrap">¿Cómo te sientes hoy?</span>
        <div class="flex gap-1" id="mood-selector">
            <button class="mood-btn text-xl p-2 rounded-full hover:bg-[#FFDB89]/10 transition" data-mood="amazing" title="Increíble"><i class="fas fa-grin-stars text-[#FFDB89]"></i></button>
            <button class="mood-btn text-xl p-2 rounded-full hover:bg-[#FFDB89]/10 transition" data-mood="great" title="Genial"><i class="fas fa-smile text-green-400"></i></button>
            <button class="mood-btn text-xl p-2 rounded-full hover:bg-white/5 transition" data-mood="neutral" title="Normal"><i class="fas fa-meh text-[#FFDB89]/30"></i></button>
            <button class="mood-btn text-xl p-2 rounded-full hover:bg-[#FFDB89]/10 transition" data-mood="tired" title="Cansado"><i class="fas fa-tired text-orange-400"></i></button>
            <button class="mood-btn text-xl p-2 rounded-full hover:bg-red-500/10 transition" data-mood="bad" title="Mal"><i class="fas fa-angry text-red-400"></i></button>
        </div>
        <span id="mood-saved-indicator" class="text-xs text-green-400 hidden"><i class="fas fa-check mr-1"></i>Guardado</span>
    </div>

    <!-- Tab Bar -->
    <div class="flex gap-1 shrink-0 bg-[#FFDB89]/5 border border-[#FFDB89]/15 rounded-xl p-1 mb-4">
        <button id="client-tab-calendar"
            class="client-prog-tab active flex-1 py-2 rounded-lg text-sm font-bold transition bg-[#FFDB89] text-[#030303]">
            <i class="fas fa-calendar-alt mr-1.5"></i>Calendario
        </button>
        <button id="client-tab-upcoming"
            class="client-prog-tab flex-1 py-2 rounded-lg text-sm font-bold transition text-[#FFDB89]/60 hover:text-[#FFDB89]">
            <i class="fas fa-forward mr-1.5"></i>Próximos
        </button>
        <button id="client-tab-history"
            class="client-prog-tab flex-1 py-2 rounded-lg text-sm font-bold transition text-[#FFDB89]/60 hover:text-[#FFDB89]">
            <i class="fas fa-history mr-1.5"></i>Historial
        </button>
    </div>

    <!-- Panel: Calendar (default) -->
    <div id="client-panel-calendar" class="flex-grow overflow-y-auto rounded-xl" id="client-calendar-scroll">
        <div id="client-calendar-container">
            <p class="text-center text-[#FFDB89]/40 py-12 animate-pulse text-sm">Cargando calendario...</p>
        </div>
    </div>

    <!-- Panel: Upcoming Workouts -->
    <div id="client-panel-upcoming" class="flex-grow overflow-y-auto hidden">
        <div id="client-upcoming-container" class="space-y-3">
            <p class="text-center text-[#FFDB89]/40 py-12 animate-pulse text-sm">Cargando...</p>
        </div>
    </div>

    <!-- Panel: History -->
    <div id="client-panel-history" class="flex-grow overflow-y-auto hidden">
        <div id="client-history-container" class="space-y-3">
            <p class="text-center text-[#FFDB89]/40 py-12 animate-pulse text-sm">Cargando...</p>
        </div>
    </div>

</div>

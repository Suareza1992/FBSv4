<div class="space-y-5 pb-10" id="historial-root">

    <div>
        <h2 class="text-2xl sm:text-3xl font-bold text-[#FFDB89]">Mi historial</h2>
        <p class="text-[#FFDB89]/40 mt-1 text-sm">Revisa tu progreso ejercicio por ejercicio.</p>
    </div>

    <!-- Search -->
    <div class="relative">
        <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-[#FFDB89]/30 text-sm pointer-events-none"></i>
        <input id="historial-search" type="text" placeholder="Buscar ejercicio..."
               class="w-full bg-[#FFDB89]/5 border border-[#FFDB89]/15 rounded-xl pl-10 pr-4 py-3 text-[#FFDB89] placeholder-[#FFDB89]/25 text-sm focus:outline-none focus:border-[#FFDB89]/40 transition" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>

    <!-- Loading -->
    <div id="historial-loading" class="text-center py-16 text-[#FFDB89]/40">
        <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>
        <p class="text-sm">Cargando historial...</p>
    </div>

    <!-- Empty state -->
    <div id="historial-empty" class="hidden text-center py-16">
        <i class="fas fa-history text-4xl text-[#FFDB89]/15 mb-4 block"></i>
        <p class="text-[#FFDB89]/40 text-sm font-medium">Aún no tienes resultados guardados.</p>
        <p class="text-[#FFDB89]/25 text-xs mt-2">Completa un ejercicio en tu programa para<br>ver el historial aquí.</p>
    </div>

    <!-- No search results -->
    <div id="historial-no-results" class="hidden text-center py-10">
        <i class="fas fa-search text-3xl text-[#FFDB89]/15 mb-3 block"></i>
        <p class="text-[#FFDB89]/40 text-sm">No hay ejercicios que coincidan con tu búsqueda.</p>
    </div>

    <!-- Exercise cards -->
    <div id="historial-list" class="hidden space-y-2.5">
        <!-- Injected by initClientHistorial() -->
    </div>

</div>

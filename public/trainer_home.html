<div class="space-y-6 pb-10">

    <div class="border-b border-[#FFDB89]/10 pb-4">
        <!-- Greeting -->
        <h1 class="text-3xl font-bold text-[#FFDB89] mb-3" id="greeting-text">¡Buenos días!</h1>

        <!-- Controls row — all on the same baseline -->
        <div class="flex items-center justify-between gap-4 flex-wrap">
            <!-- Filter -->
            <div class="flex items-center gap-3">
                <span class="text-sm text-[#FFDB89]/70 font-bold">Novedades de</span>
                <div class="relative">
                    <button id="client-filter-btn" onclick="document.getElementById('client-filter-dropdown').classList.toggle('hidden')"
                        class="flex items-center gap-1.5 text-sm font-bold text-[#FFDB89] border-b-2 border-[#FFDB89]/30 pb-0.5 hover:border-[#FFDB89] transition">
                        <span id="client-filter-label">Todos</span>
                        <i class="fas fa-caret-down text-xs"></i>
                    </button>
                    <div id="client-filter-dropdown" class="absolute top-full left-0 mt-2 w-48 bg-[#FDF8F2] rounded-lg shadow-xl border border-[#0D0D0D]/10 hidden z-20">
                        <div class="py-2">
                            <a href="#" onclick="window.setClientFilter('Todos')" class="block px-4 py-2 text-sm text-[#0D0D0D] hover:bg-[#92A9E1]/10 font-bold"><i class="fas fa-check mr-2 text-[#FFDB89]"></i>Todos los clientes</a>
                            <div class="border-t border-[#0D0D0D]/10 my-1"></div>
                            <div class="px-4 py-1 text-xs text-[#0D0D0D]/50 uppercase font-bold">Tipo</div>
                            <a href="#" onclick="window.setClientFilter('Presencial')" class="block px-4 py-2 text-sm text-[#0D0D0D] hover:bg-[#92A9E1]/10">Presencial</a>
                            <a href="#" onclick="window.setClientFilter('Remoto')"     class="block px-4 py-2 text-sm text-[#0D0D0D] hover:bg-[#92A9E1]/10">Remoto</a>
                            <a href="#" onclick="window.setClientFilter('Híbrido')"   class="block px-4 py-2 text-sm text-[#0D0D0D] hover:bg-[#92A9E1]/10">Híbrido</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Rest days toggle -->
            <label class="flex items-center gap-2 cursor-pointer select-none mr-4">
                <input type="checkbox" id="show-rest-days" class="w-4 h-4 rounded border-[#92A9E1] text-[#92A9E1] focus:ring-[#92A9E1] bg-white/10">
                <span class="text-sm font-bold text-[#FFDB89]/70">Mostrar días de descanso</span>
            </label>
        </div>
    </div>

    <div id="trainer-feed-container" class="space-y-8">
        </div>


</div>

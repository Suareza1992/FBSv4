<div class="space-y-6 pb-10">

    <div class="flex flex-col md:flex-row justify-between items-end border-b border-[#0D0D0D]/10 pb-4 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-[#FFDB89] mb-4" id="greeting-text">¡Buenos días!</h1>

            <div class="flex items-center gap-4">
                <span class="text-sm text-[#FFDB89] font-bold">Novedades de</span>
                <div class="relative">
                    <button id="client-filter-btn" onclick="document.getElementById('client-filter-dropdown').classList.toggle('hidden')" class="flex items-center gap-2 text-sm font-bold text-[#FFDB89] border-b-2 border-[#030303] pb-1 hover:border-[#0D0D0D] transition">
                        <span id="client-filter-label">Todos</span>
                        <i class="fas fa-caret-down text-xs"></i>
                    </button>
                    <div id="client-filter-dropdown" class="absolute top-full left-0 mt-2 w-48 bg-[#FDF8F2] rounded-lg shadow-xl border border-[#0D0D0D]/10 hidden z-20">
                        <div class="py-2">
                            <a href="#" onclick="window.setClientFilter('Todos')" class="block px-4 py-2 text-sm text-[#0D0D0D] hover:bg-[#92A9E1]/10 font-bold"><i class="fas fa-check mr-2 text-[#FFDB89]"></i>Todos los clientes</a>
                            <div class="border-t border-[#0D0D0D]/10 my-1"></div>
                            <div class="px-4 py-1 text-xs text-[#0D0D0D]/50 uppercase font-bold">Tipo</div>
                            <a href="#" onclick="window.setClientFilter('Presencial')" class="block px-4 py-2 text-sm text-[#FFDB89] hover:bg-[#92A9E1]/10">Presencial</a>
                            <a href="#" onclick="window.setClientFilter('Remoto')" class="block px-4 py-2 text-sm text-[#FFDB89] hover:bg-[#92A9E1]/10">Remoto</a>
                            <a href="#" onclick="window.setClientFilter('Híbrido')" class="block px-4 py-2 text-sm text-[#FFDB89] hover:bg-[#92A9E1]/10">Híbrido</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" id="show-rest-days" class="w-4 h-4 rounded border-[#92A9E1] text-[#92A9E1] focus:ring-[#92A9E1] bg-white">
            <label for="show-rest-days" class="text-sm font-bold text-[#FFDB89]">Mostrar días de descanso</label>
        </div>
    </div>

    <div id="trainer-feed-container" class="space-y-8">
        </div>


</div>

<div class="space-y-6 pb-10">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
            <h1 class="text-3xl font-bold text-[#FFDB89]" id="client-greeting">Bienvenido!</h1>
            <p class="text-[#92A9E1]/70 mt-1" id="client-today-date"></p>
        </div>
    </div>

    <!-- Today's Workout Card -->
    <div class="border-b border-[#92A9E1]/20 pb-6">
        <div class="flex items-center gap-2 mb-4">
            <i class="fas fa-dumbbell text-[#92A9E1]"></i>
            <h3 class="text-lg font-bold text-white">Entrenamiento de Hoy</h3>
        </div>
        <div id="today-workout-content">
            <p class="text-[#92A9E1]/50 text-sm animate-pulse">Cargando...</p>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white/5 border border-[#92A9E1]/20 p-4 rounded-xl text-center">
            <p class="text-2xl font-black text-[#92A9E1]" id="stat-workouts-week">0</p>
            <p class="text-xs font-bold text-[#92A9E1]/50 uppercase mt-1">Esta semana</p>
        </div>
        <div class="bg-white/5 border border-[#92A9E1]/20 p-4 rounded-xl text-center">
            <p class="text-2xl font-black text-green-400" id="stat-streak">0</p>
            <p class="text-xs font-bold text-[#92A9E1]/50 uppercase mt-1">Dias de racha</p>
        </div>
        <div class="bg-white/5 border border-[#92A9E1]/20 p-4 rounded-xl text-center">
            <p class="text-2xl font-black text-[#FFDB89]" id="stat-total-workouts">0</p>
            <p class="text-xs font-bold text-[#92A9E1]/50 uppercase mt-1">Total entrenamientos</p>
        </div>
        <div class="bg-white/5 border border-[#92A9E1]/20 p-4 rounded-xl text-center">
            <p class="text-2xl font-black text-white text-sm" id="stat-program">--</p>
            <p class="text-xs font-bold text-[#92A9E1]/50 uppercase mt-1">Programa actual</p>
        </div>
    </div>

    <!-- Motivational Tip -->
    <div class="bg-[#92A9E1]/10 border border-[#92A9E1]/20 rounded-xl p-6">
        <p class="text-sm font-bold text-[#FFDB89] uppercase tracking-wider mb-1"><i class="fas fa-lightbulb mr-1"></i> Tip del dia</p>
        <p id="client-daily-tip" class="text-white/80 text-lg font-medium italic">Mantente hidratado durante el entrenamiento.</p>
    </div>

    <!-- Recent Activity -->
    <div class="border-b border-[#92A9E1]/20 pb-6">
        <div class="flex items-center gap-2 mb-4 pb-3 border-b border-[#92A9E1]/20">
            <i class="fas fa-history text-[#92A9E1]/50"></i>
            <h3 class="font-bold text-white">Actividad Reciente</h3>
        </div>
        <div id="client-recent-activity" class="space-y-3">
            <p class="text-[#92A9E1]/50 text-sm">Cargando actividad...</p>
        </div>
    </div>

</div>

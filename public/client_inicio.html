<div class="space-y-6 pb-10">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white" id="client-greeting">Bienvenido!</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1" id="client-today-date"></p>
        </div>
    </div>

    <!-- Today's Workout Card -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="p-5 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-blue-50 to-purple-50 dark:from-gray-800 dark:to-gray-750">
            <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100"><i class="fas fa-dumbbell mr-2 text-blue-500"></i>Entrenamiento de Hoy</h3>
        </div>
        <div id="today-workout-content" class="p-6">
            <p class="text-gray-400 text-sm animate-pulse">Cargando...</p>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
            <p class="text-2xl font-black text-blue-600" id="stat-workouts-week">0</p>
            <p class="text-xs font-bold text-gray-500 uppercase mt-1">Esta semana</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
            <p class="text-2xl font-black text-green-600" id="stat-streak">0</p>
            <p class="text-xs font-bold text-gray-500 uppercase mt-1">Dias de racha</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
            <p class="text-2xl font-black text-purple-600" id="stat-total-workouts">0</p>
            <p class="text-xs font-bold text-gray-500 uppercase mt-1">Total entrenamientos</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
            <p class="text-2xl font-black text-orange-600 text-sm" id="stat-program">--</p>
            <p class="text-xs font-bold text-gray-500 uppercase mt-1">Programa actual</p>
        </div>
    </div>

    <!-- Motivational Tip -->
    <div class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-xl p-6 text-white shadow-lg">
        <p class="text-sm font-bold uppercase tracking-wider mb-1"><i class="fas fa-lightbulb mr-1"></i> Tip del dia</p>
        <p id="client-daily-tip" class="text-lg font-medium italic">Mantente hidratado durante el entrenamiento.</p>
    </div>

    <!-- Recent Activity -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="p-4 border-b border-gray-100 dark:border-gray-700">
            <h3 class="font-bold text-gray-800 dark:text-gray-100"><i class="fas fa-history mr-2 text-gray-400"></i>Actividad Reciente</h3>
        </div>
        <div id="client-recent-activity" class="p-4 space-y-3">
            <p class="text-gray-400 text-sm">Cargando actividad...</p>
        </div>
    </div>

</div>

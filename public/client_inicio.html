<div class="space-y-6 pb-10">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
            <h1 class="text-3xl font-bold text-[#FFDB89]" id="client-greeting">¡Bienvenido!</h1>
            <p class="text-[#FFDB89]/40 mt-1" id="client-today-date"></p>
        </div>
    </div>

    <!-- Today's Workout Card -->
    <div class="border-b border-[#FFDB89]/15 pb-6">
        <div class="flex items-center gap-2 mb-4">
            <i class="fas fa-dumbbell text-[#FFDB89]/60"></i>
            <h3 class="text-lg font-bold text-[#FFDB89]">Entrenamiento de Hoy</h3>
        </div>
        <div id="today-workout-content">
            <p class="text-[#FFDB89]/30 text-sm animate-pulse">Cargando...</p>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="bg-[#FFDB89]/5 border border-[#FFDB89]/15 p-4 rounded-xl text-center flex flex-col items-center justify-center gap-1">
            <p class="text-2xl font-black text-[#FFDB89]" id="stat-workouts-week">0</p>
            <p class="text-[10px] font-bold text-[#FFDB89]/40 uppercase tracking-wider">Esta semana</p>
        </div>
        <div class="bg-[#FFDB89]/5 border border-[#FFDB89]/15 p-4 rounded-xl text-center flex flex-col items-center justify-center gap-1">
            <p class="text-2xl font-black text-green-400" id="stat-streak">0</p>
            <p class="text-[10px] font-bold text-[#FFDB89]/40 uppercase tracking-wider">Días de racha</p>
        </div>
        <div class="bg-[#FFDB89]/5 border border-[#FFDB89]/15 p-4 rounded-xl text-center flex flex-col items-center justify-center gap-1">
            <p class="text-2xl font-black text-[#FFDB89]" id="stat-total-workouts">0</p>
            <p class="text-[10px] font-bold text-[#FFDB89]/40 uppercase tracking-wider">Total entrenos</p>
        </div>
        <div class="bg-[#FFDB89]/5 border border-[#FFDB89]/15 p-4 rounded-xl text-center flex flex-col items-center justify-center gap-1">
            <p class="text-base font-black text-[#FFDB89] leading-tight" id="stat-program">--</p>
            <p class="text-[10px] font-bold text-[#FFDB89]/40 uppercase tracking-wider">Programa actual</p>
        </div>
    </div>

    <!-- Motivational Tip -->
    <div class="bg-[#FFDB89]/5 border border-[#FFDB89]/15 rounded-xl p-5 flex items-start gap-3">
        <i class="fas fa-lightbulb text-[#FFDB89]/60 mt-0.5 shrink-0"></i>
        <div>
            <p class="text-[10px] font-bold text-[#FFDB89]/50 uppercase tracking-wider mb-1">Tip del día</p>
            <p id="client-daily-tip" class="text-[#FFDB89]/80 text-sm font-medium italic">Mantente hidratado durante el entrenamiento.</p>
        </div>
    </div>

    <!-- Recent Activity -->
    <div>
        <div class="flex items-center gap-2 mb-4 pb-3 border-b border-[#FFDB89]/15">
            <i class="fas fa-history text-[#FFDB89]/40 text-sm"></i>
            <h3 class="font-bold text-[#FFDB89]">Actividad Reciente</h3>
        </div>
        <div id="client-recent-activity" class="space-y-2">
            <p class="text-[#FFDB89]/30 text-sm">Cargando actividad...</p>
        </div>
    </div>

</div>

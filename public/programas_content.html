<style>
    .exercise-name-input::-webkit-calendar-picker-indicator {
        display: none !important;
        opacity: 0;
    }
</style>

<div id="programs-main-view" class="space-y-8 pb-10">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-3xl font-bold text-[#FFDB89]">Mis programas</h2>
            <p class="text-[#FFDB89]/60">Diseña y organiza tus planes de entrenamiento.</p>
        </div>
        <div class="flex flex-wrap gap-3 mr-4">
            <button class="px-6 py-2 bg-[#2C2C2E] text-[#FFDB89] font-bold rounded-lg border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 transition">
                <i class="fas fa-tags mr-2"></i> Manejar etiquetas
            </button>
            <button id="open-create-program-modal" class="px-6 py-2 bg-[#2C2C2E] text-[#FFDB89] font-bold rounded-lg border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 transition">
                <i class="fas fa-plus mr-2"></i> Crear programa
            </button>
        </div>
    </div>

    <div class="py-2 px-px">
        <div class="relative w-full md:w-1/3">
            <input type="text" placeholder="Buscar programa..." class="w-full pl-10 pr-4 py-2 bg-[#0D0D0D] border border-[#FFDB89]/30 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/40 focus:outline-none focus:ring-2 focus:ring-[#FFDB89]/50">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-[#FFDB89]/50"></i>
        </div>
    </div>

    <div id="programs-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    </div>
</div>

<div id="create-program-modal" class="fixed inset-0 bg-black/80 z-50 flex justify-center items-center hidden backdrop-blur-sm">
    <div class="bg-[#030303] border border-[#FFDB89]/20 p-8 rounded-2xl shadow-2xl w-full max-w-lg">
        <h3 class="text-2xl font-bold text-[#FFDB89] mb-6">Crear nuevo programa</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-[#FFDB89]/60 mb-1">Nombre del programa</label>
                <input type="text" id="program-name-input" class="w-full p-3 bg-[#FFDB89]/5 border border-[#FFDB89]/20 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/30 focus:ring-2 focus:ring-[#FFDB89]/40 outline-none" placeholder="Ej: Hipertrofia 12 Semanas">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#FFDB89]/60 mb-1">Descripción (opcional)</label>
                <textarea id="program-desc-input" class="w-full p-3 bg-[#FFDB89]/5 border border-[#FFDB89]/20 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/30 focus:ring-2 focus:ring-[#FFDB89]/40 outline-none" rows="3"></textarea>
            </div>
        </div>
        <div class="mt-8 flex justify-end gap-3">
            <button id="cancel-create-program" class="px-6 py-2 bg-[#FFDB89]/10 hover:bg-[#FFDB89]/20 text-[#FFDB89] rounded-lg font-bold transition">Cancelar</button>
            <button id="save-and-add-workouts" class="px-6 py-2 bg-[#2C2C2E] border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 text-[#FFDB89] rounded-lg font-bold transition">Guardar y Añadir rutinas</button>
        </div>
    </div>
</div>

<div id="program-builder-view" class="hidden h-full flex flex-col">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-[#FFDB89]/20 pb-4">
        <div>
            <button id="back-to-program-list" class="text-[#FFDB89]/50 hover:text-[#FFDB89] mb-2 flex items-center text-sm font-bold transition">
                <i class="fas fa-arrow-left mr-2"></i> Volver a programas
            </button>
            <h2 id="builder-program-name" class="text-3xl font-bold text-[#FFDB89]">Nombre del programa</h2>
            <p class="text-sm text-[#FFDB89]/50 mt-1"><i class="fas fa-users mr-1"></i> <span id="builder-client-count">0</span> Clientes activos</p>
        </div>
        <button class="bg-[#2C2C2E] border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 text-[#FFDB89] px-6 py-2 rounded-lg font-bold flex items-center transition">
            <i class="fas fa-user-plus mr-2"></i> Asignar a un cliente
        </button>
    </div>

    <div id="calendar-container" class="space-y-8 pb-20">
    </div>

    <div class="mt-8 text-center pb-12">
        <button id="add-week-btn" class="px-8 py-3 bg-[#FFDB89]/10 hover:bg-[#FFDB89]/20 text-[#FFDB89] font-bold rounded-full border border-[#FFDB89]/30 transition">
            <i class="fas fa-plus mr-2"></i> Añadir semana
        </button>
    </div>

</div>

<div id="edit-routine-modal" class="fixed inset-0 bg-black/80 z-[60] flex justify-center items-center hidden backdrop-blur-sm p-4 overflow-y-auto">
    <div class="bg-[#030303] border border-[#FFDB89]/20 w-full max-w-4xl min-h-[500px] rounded-2xl shadow-2xl flex flex-col relative my-10">

        <div class="px-6 py-4 border-b border-[#FFDB89]/20 flex justify-between items-center bg-[#FFDB89]/5 rounded-t-2xl">
            <input type="text" id="routine-name-input" value="Nombre del Entrenamiento" class="text-xl font-bold bg-transparent border-none focus:ring-0 text-[#FFDB89] placeholder:text-[#FFDB89]/30 w-full outline-none">
            <button id="cancel-routine-edit" class="text-[#FFDB89]/50 hover:text-red-400 transition"><i class="fas fa-times text-2xl"></i></button>
        </div>

        <div class="flex-grow p-6 space-y-6 overflow-y-visible">

            <div>
                <label class="text-xs font-bold text-[#FFDB89]/50 uppercase mb-2 block tracking-wider">Calentamiento</label>
                <textarea id="routine-warmup" class="w-full p-3 bg-[#FFDB89]/5 border border-[#FFDB89]/20 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/30 resize-none outline-none focus:border-[#FFDB89]/50" rows="2" placeholder="Ej: 5 min caminadora..."></textarea>
            </div>

            <div id="exercise-list" class="space-y-6 pl-4 border-l-2 border-[#FFDB89]/20">
            </div>

            <div class="flex justify-center gap-4 pt-2">
                <button onclick="addExerciseToBuilder()" class="px-6 py-2 border-2 border-[#FFDB89]/20 text-[#FFDB89]/60 rounded-lg font-bold hover:bg-[#FFDB89]/10 hover:text-[#FFDB89] transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Ejercicio
                </button>
                <button class="px-6 py-2 border-2 border-[#FFDB89]/20 text-[#FFDB89]/60 rounded-lg font-bold hover:bg-[#FFDB89]/10 hover:text-[#FFDB89] transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Circuito
                </button>
            </div>

            <div>
                <label class="text-xs font-bold text-[#FFDB89]/50 uppercase mb-2 block tracking-wider">Enfriamiento</label>
                <textarea id="routine-cooldown" class="w-full p-3 bg-[#FFDB89]/5 border border-[#FFDB89]/20 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/30 resize-none outline-none focus:border-[#FFDB89]/50" rows="2" placeholder="Ej: Estiramientos..."></textarea>
            </div>

        </div>

        <div class="p-6 border-t border-[#FFDB89]/20 flex justify-end gap-4 bg-[#FFDB89]/5 rounded-b-2xl">
            <button id="cancel-routine-btn-footer" class="px-6 py-2 bg-[#FFDB89]/10 border border-[#FFDB89]/20 text-[#FFDB89] font-bold rounded-lg hover:bg-[#FFDB89]/20 transition">Cancelar</button>
            <button id="save-routine-btn" class="px-8 py-2 bg-[#2C2C2E] border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 text-[#FFDB89] font-bold rounded-lg transition">Guardar rutina</button>
        </div>
    </div>
</div>

<div id="video-upload-modal" class="fixed inset-0 bg-black/80 z-[70] flex justify-center items-center hidden backdrop-blur-sm">
    <div class="bg-[#030303] border border-[#FFDB89]/20 text-[#FFDB89] p-6 rounded-xl shadow-2xl w-full max-w-md">

        <div class="flex items-center gap-2 mb-4">
            <i class="fas fa-info-circle text-[#FFDB89] text-xl"></i>
            <h3 id="video-modal-title" class="text-xl font-bold text-[#FFDB89]">Nombre del ejercicio</h3>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2 text-[#FFDB89]/60">Enlace del video - (YouTube o Vimeo)</label>
            <input type="text" id="video-url-input" class="w-full p-3 bg-[#FFDB89]/5 border border-[#FFDB89]/20 rounded-lg text-[#FFDB89] placeholder:text-[#FFDB89]/30 outline-none focus:border-[#FFDB89]/50 transition" placeholder="Paste link here...">
        </div>

        <div class="text-center text-[#FFDB89]/40 text-sm mb-4 font-bold">o</div>

        <div class="mb-2">
            <button id="trigger-upload-btn" class="w-full py-2 border border-[#FFDB89]/30 rounded-lg hover:bg-[#FFDB89]/10 transition flex items-center justify-center gap-2 font-bold text-sm text-[#FFDB89]">
                <i class="fas fa-upload"></i> Subir un video
            </button>
            <input type="file" id="hidden-video-file" accept="video/*" class="hidden" style="display:none;">
        </div>

        <p id="upload-file-name" class="text-xs text-[#FFDB89] mb-6 text-center font-mono truncate hidden"></p>

        <div class="flex items-center gap-4">
            <button id="save-video-btn" class="bg-[#2C2C2E] border border-[#FFDB89]/30 hover:bg-[#FFDB89]/20 text-[#FFDB89] px-6 py-2 rounded-lg font-bold transition opacity-50 cursor-not-allowed">Guardar en la librería</button>
            <button id="cancel-video-btn" class="text-[#FFDB89]/60 hover:text-[#FFDB89] font-bold transition">Cancelar</button>
        </div>
    </div>
</div>

<datalist id="exercise-suggestions">
    <option value="Squat (Barbell)">
    <option value="Bench Press">
    <option value="Deadlift">
    <option value="Overhead Press">
    <option value="Pull Up">
    <option value="Dumbbell Row">
    <option value="Lunges">
    <option value="Plank">
</datalist>

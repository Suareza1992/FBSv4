<style>
    /* Targets the specific input class used in the builder */
    .exercise-name-input::-webkit-calendar-picker-indicator {
        display: none !important;
        opacity: 0;
    }
</style>

<div id="programs-main-view" class="space-y-8 pb-10">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-3xl font-bold text-[#0D0D0D]">Mis programas</h2>
            <p class="text-[#0D0D0D]/50">Diseña y organiza tus planes de entrenamiento.</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button class="px-6 py-2 bg-[#92A9E1]/20 hover:bg-[#92A9E1]/30 text-[#0D0D0D] font-bold rounded-lg transition">
                <i class="fas fa-tags mr-2"></i> Manejar etiquetas
            </button>
            <button id="open-create-program-modal" class="px-6 py-2 bg-[#92A9E1] hover:bg-[#7b93cc] text-white font-bold rounded-lg shadow-lg transform hover:scale-105 transition">
                <i class="fas fa-plus mr-2"></i> Crear programa
            </button>
        </div>
    </div>

    <div class="py-2">
        <div class="relative w-full md:w-1/3">
            <input type="text" placeholder="Buscar programa..." class="w-full pl-10 pr-4 py-2 bg-white border border-[#0D0D0D]/10 rounded-lg text-[#0D0D0D] focus:outline-none focus:ring-2 focus:ring-[#92A9E1]">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-[#92A9E1]"></i>
        </div>
    </div>

    <div id="programs-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>
</div>

<div id="create-program-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex justify-center items-center hidden backdrop-blur-sm">
    <div class="bg-[#FDF8F2] p-8 rounded-2xl shadow-2xl w-full max-w-lg transform transition-all">
        <h3 class="text-2xl font-bold text-[#0D0D0D] mb-6">Crear nuevo programa</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-[#0D0D0D]/50 mb-1">Nombre del programa</label>
                <input type="text" id="program-name-input" class="w-full p-3 bg-white border border-[#0D0D0D]/10 rounded-lg text-[#0D0D0D] focus:ring-2 focus:ring-[#92A9E1] outline-none" placeholder="Ej: Hipertrofia 12 Semanas">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#0D0D0D]/50 mb-1">Descripción (opcional)</label>
                <textarea id="program-desc-input" class="w-full p-3 bg-white border border-[#0D0D0D]/10 rounded-lg text-[#0D0D0D] focus:ring-2 focus:ring-[#92A9E1] outline-none" rows="3"></textarea>
            </div>
        </div>
        <div class="mt-8 flex justify-end gap-3">
            <button id="cancel-create-program" class="px-6 py-2 bg-[#92A9E1]/10 hover:bg-[#92A9E1]/20 text-[#0D0D0D] rounded-lg font-bold transition">Cancelar</button>
            <button id="save-and-add-workouts" class="px-6 py-2 bg-[#92A9E1] hover:bg-[#7b93cc] text-white rounded-lg font-bold shadow-lg transition transform hover:scale-105">Guardar y Añadir rutinas</button>
        </div>
    </div>
</div>

<div id="program-builder-view" class="hidden h-full flex flex-col">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-[#0D0D0D]/10 pb-4">
        <div>
            <button id="back-to-program-list" class="text-[#0D0D0D]/50 hover:text-[#92A9E1] mb-2 flex items-center text-sm font-bold transition">
                <i class="fas fa-arrow-left mr-2"></i> Volver a programas
            </button>
            <h2 id="builder-program-name" class="text-3xl font-bold text-[#0D0D0D]">Nombre del programa</h2>
            <p class="text-sm text-[#0D0D0D]/50 mt-1"><i class="fas fa-users mr-1"></i> <span id="builder-client-count">0</span> Clientes activos</p>
        </div>
        <button class="bg-[#92A9E1] hover:bg-[#7b93cc] text-white px-6 py-2 rounded-lg font-bold shadow-lg flex items-center transition transform hover:scale-105">
            <i class="fas fa-user-plus mr-2"></i> Asignar a un cliente
        </button>
    </div>

    <div id="calendar-container" class="space-y-8 pb-20">
        </div>

    <div class="mt-8 text-center pb-12">
        <button id="add-week-btn" class="px-8 py-3 bg-[#92A9E1]/20 hover:bg-[#92A9E1]/30 text-[#0D0D0D] font-bold rounded-full shadow transition transform hover:scale-105">
            <i class="fas fa-plus mr-2"></i> Añadir semana
        </button>
    </div>

</div>

<div id="edit-routine-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-[60] flex justify-center items-center hidden backdrop-blur-sm p-4 overflow-y-auto">
    <div class="bg-[#FDF8F2] w-full max-w-4xl min-h-[500px] rounded-2xl shadow-2xl flex flex-col relative my-10">

        <div class="px-6 py-4 border-b border-[#0D0D0D]/10 flex justify-between items-center bg-[#92A9E1]/10 rounded-t-2xl">
            <input type="text" id="routine-name-input" value="Nombre del Entrenamiento" class="text-xl font-bold bg-transparent border-none focus:ring-0 text-[#0D0D0D] placeholder-[#0D0D0D]/30 w-full outline-none">
            <button id="cancel-routine-edit" class="text-[#92A9E1] hover:text-red-500 transition"><i class="fas fa-times text-2xl"></i></button>
        </div>

        <div class="flex-grow p-6 space-y-6 overflow-y-visible">

            <div>
                <label class="text-xs font-bold text-[#0D0D0D]/50 uppercase mb-2 block tracking-wider">Calentamiento</label>
                <textarea id="routine-warmup" class="w-full p-3 bg-white border border-[#0D0D0D]/10 rounded-lg text-[#0D0D0D] resize-none outline-none focus:border-[#92A9E1]" rows="2" placeholder="Ej: 5 min caminadora..."></textarea>
            </div>

            <div id="exercise-list" class="space-y-6 pl-4 border-l-2 border-[#92A9E1]/40">
                </div>

            <div class="flex justify-center gap-4 pt-2">
                <button onclick="addExerciseToBuilder()" class="px-6 py-2 border-2 border-[#0D0D0D]/10 text-[#0D0D0D]/50 rounded-lg font-bold hover:bg-[#92A9E1]/10 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Ejercicio
                </button>
                <button class="px-6 py-2 border-2 border-[#0D0D0D]/10 text-[#0D0D0D]/50 rounded-lg font-bold hover:bg-[#92A9E1]/10 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Circuito
                </button>
            </div>

            <div>
                <label class="text-xs font-bold text-[#0D0D0D]/50 uppercase mb-2 block tracking-wider">Enfriamiento</label>
                <textarea id="routine-cooldown" class="w-full p-3 bg-white border border-[#0D0D0D]/10 rounded-lg text-[#0D0D0D] resize-none outline-none focus:border-[#92A9E1]" rows="2" placeholder="Ej: Estiramientos..."></textarea>
            </div>

        </div>

        <div class="p-6 border-t border-[#0D0D0D]/10 flex justify-end gap-4 bg-[#92A9E1]/10 rounded-b-2xl">
            <button id="cancel-routine-btn-footer" class="px-6 py-2 bg-white border border-[#0D0D0D]/10 text-[#0D0D0D] font-bold rounded-lg hover:bg-[#92A9E1]/10 transition">Cancelar</button>
            <button id="save-routine-btn" class="px-8 py-2 bg-[#92A9E1] hover:bg-[#7b93cc] text-white font-bold rounded-lg shadow-lg transition transform hover:scale-105">Guardar rutina</button>
        </div>
    </div>
</div>

<div id="video-upload-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-[70] flex justify-center items-center hidden backdrop-blur-sm">
    <div class="bg-slate-700 text-white p-6 rounded-xl shadow-2xl w-full max-w-md transform transition-all border border-slate-600">

        <div class="flex items-center gap-2 mb-4">
            <i class="fas fa-info-circle text-white text-xl"></i>
            <h3 id="video-modal-title" class="text-xl font-bold">Nombre del ejercicio</h3>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2 text-gray-300">Enlace del video - (YouTube o Vimeo)</label>
            <input type="text" id="video-url-input" class="w-full p-3 bg-slate-800 border border-slate-600 rounded-lg text-white outline-none focus:border-[#92A9E1] transition" placeholder="Paste link here...">
        </div>

        <div class="text-center text-gray-400 text-sm mb-4 font-bold">o</div>

        <div class="mb-2">
            <button id="trigger-upload-btn" class="w-full py-2 border border-white/30 rounded-lg hover:bg-white/10 transition flex items-center justify-center gap-2 font-bold text-sm">
                <i class="fas fa-upload"></i> Subir un video
            </button>
            <input type="file" id="hidden-video-file" accept="video/*" class="hidden" style="display:none;">
        </div>

        <p id="upload-file-name" class="text-xs text-[#92A9E1] mb-6 text-center font-mono truncate hidden"></p>

        <div class="flex items-center gap-4">
            <button id="save-video-btn" class="bg-[#92A9E1] hover:bg-[#7b93cc] text-white px-6 py-2 rounded-lg font-bold transition shadow-lg opacity-50 cursor-not-allowed">Guardar en la librería</button>
            <button id="cancel-video-btn" class="text-white hover:text-gray-300 font-bold transition">Cancelar</button>
        </div>
    </div>
</div>

<datalist id="exercise-suggestions">
    <option value="Squat (Barbell)">
    <option value="Bench Press">
    <option value="Deadlift">
    <option value="Overhead Press">
    <option value="Pull Up">
    <option value="Dumbbell Row">
    <option value="Lunges">
    <option value="Plank">
</datalist>

<div class="space-y-6 pb-10">

    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-bold text-[#FFDB89]">Fotos de progreso</h2>
            <p class="text-[#FFDB89]/40 mt-1">Visualiza tu transformación.</p>
        </div>
        <div class="flex items-center gap-2">
            <div id="client-photos-header"></div>
            <button id="upload-photo-btn" class="bg-[#FFDB89] hover:bg-[#ffe9a8] text-[#030303] px-4 py-2 rounded-lg shadow flex items-center gap-2 font-semibold transition">
                <i class="fas fa-upload"></i> Subir foto
            </button>
        </div>
    </div>

    <!-- Compare hint -->
    <p id="client-compare-hint" class="text-xs text-[#FFDB89]/60 text-center hidden"></p>

    <!-- Loading state -->
    <div id="photos-loading" class="text-center py-12 text-[#FFDB89]/40">
        <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>
        <p class="text-sm">Cargando fotos...</p>
    </div>

    <!-- Photos grid -->
    <div id="progress-photos-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
        <!-- Injected by JS -->
    </div>

    <!-- Compare action button (shown when 2 photos selected) -->
    <div class="flex justify-center pt-2 hidden" id="client-compare-action">
        <button id="client-do-compare" class="px-6 py-3 bg-[#FFDB89] hover:bg-[#ffe9a8] text-[#030303] font-bold rounded-xl transition shadow-lg flex items-center gap-2">
            <i class="fas fa-columns"></i> Ver comparación
        </button>
    </div>

</div>
